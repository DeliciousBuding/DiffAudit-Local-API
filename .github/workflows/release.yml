name: release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build Linux binary
        run: |
          mkdir -p dist
          go build -trimpath -o dist/local-api ./cmd/local-api

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: local-api-${{ github.ref_name }}-linux-amd64
          path: dist/local-api

  docker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag diffaudit-local-api:${{ github.ref_name }} .
